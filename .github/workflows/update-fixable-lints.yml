name: Update fixable lint list

on:
  schedule:
    # Rust releases every 6 weeks on Thursdays. Run the day after each
    # release (Fridays on the 1st and 15th) to catch every cycle.
    - cron: "0 6 1,15 * 5"
  workflow_dispatch:
    inputs:
      channel:
        description: "Clippy channel or version (e.g. stable, rust-1.85.0)"
        default: "stable"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape MachineApplicable lints
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'stable' }}"
          echo "Scraping channel: $CHANNEL"
          python3 scripts/scrape-clippy-applicability.py --channel "$CHANNEL" --format json > fixable-lints.json
          python3 scripts/scrape-clippy-applicability.py --channel "$CHANNEL" --format cargo-toml > fixable-lints.cargo.toml
          python3 scripts/scrape-clippy-applicability.py --channel "$CHANNEL" --format pre-commit > fixable-lints.pre-commit.sh
          chmod +x fixable-lints.pre-commit.sh

      - name: Commit and push if changed
        run: |
          git diff --quiet fixable-lints.json && exit 0
          CHANNEL="${{ github.event.inputs.channel || 'stable' }}"
          LINT_COUNT=$(python3 -c "import json; print(json.load(open('fixable-lints.json'))['machine_applicable_count'])")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixable-lints.json fixable-lints.cargo.toml fixable-lints.pre-commit.sh
          git commit -m "Update fixable lint list (${LINT_COUNT} MachineApplicable lints, ${CHANNEL})"
          git push
